name: Remove main.zip from data-manifest branch

on:
  workflow_dispatch:

jobs:
  remove-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: data-manifest # Fokus hanya pada branch ini
          fetch-depth: 0 

      - name: Install git-filter-repo
        run: |
          sudo apt-get update
          pip3 install git-filter-repo

      - name: Remove main.zip from history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Filter hanya untuk menghapus main.zip
          git filter-repo --path main.zip --invert-paths --force

      - name: Push changes to data-manifest
        run: |
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          # Force push HANYA ke branch data-manifest
          git push origin --force refs/heads/data-manifest:refs/heads/data-manifest
