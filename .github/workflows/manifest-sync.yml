name: Sync Gamesak Project to Gemesak Manifest

on:
  workflow_dispatch: # Menjalankan manual
  schedule:
    - cron: '0 0 * * *' # Menjalankan otomatis setiap hari

jobs:
  sync-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Gemesak (App Branch for Manifest)
        uses: actions/checkout@v4
        with:
          repository: MKNETID/Gemesak
          token: ${{ secrets.API_TOKEN }}
          path: gemesak-app
          ref: gemesak-app

      - name: Checkout Gemesak (Data Branch for Zips)
        uses: actions/checkout@v4
        with:
          repository: MKNETID/Gemesak
          token: ${{ secrets.API_TOKEN }}
          path: gemesak-data
          ref: data-manifest

      - name: Get All Branches from Gamesak-Project
        id: get_branches
        run: |
          # Loop pagination untuk mengambil semua branch (mengantisipasi > 100 branch)
          PAGE=1
          touch all_branches.txt
          while : ; do
            URL="https://api.github.com/repos/MKNETID/Gamesak-Project/branches?per_page=100&page=$PAGE"
            RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.API_TOKEN }}" "$URL")
            
            # Jika response kosong atau bukan array, berhenti
            COUNT=$(echo "$RESPONSE" | jq '. | length')
            if [ "$COUNT" -eq "0" ] || [ "$RESPONSE" == "[]" ]; then break; fi
            
            echo "$RESPONSE" | jq -r '.[].name' >> all_branches.txt
            ((PAGE++))
          done
          echo "Total branch ditemukan di sumber: $(wc -l < all_branches.txt)"

      - name: Compare and Download Missing Zips
        id: process
        run: |
          # Ekstrak daftar yang sudah ada di JSON
          jq -r '.files[]' gemesak-app/list-manifest.json > existing_list.txt
          
          # Cari selisihnya (Branch ada di repo, tapi tidak ada di JSON)
          grep -vxFf existing_list.txt all_branches.txt > missing_list.txt || true
          
          MISSING_COUNT=$(wc -l < missing_list.txt)
          echo "Jumlah file baru yang akan diproses: $MISSING_COUNT"
          
          if [ "$MISSING_COUNT" -eq "0" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          mkdir -p new_zips
          while IFS= read -r branch; do
            echo "Downloading: $branch.zip"
            # Download file zip murni tanpa prefix folder
            curl -L -H "Authorization: token ${{ secrets.API_TOKEN }}" \
              -o "new_zips/${branch}.zip" \
              "https://github.com/MKNETID/Gamesak-Project/archive/refs/heads/${branch}.zip"
            
            # Tambahkan ke daftar file di JSON secara lokal
            jq --arg new "$branch" '.files += [$new]' gemesak-app/list-manifest.json > temp.json && mv temp.json gemesak-app/list-manifest.json
          done < missing_list.txt

          # Update total count di JSON
          NEW_TOTAL=$(jq '.files | length' gemesak-app/list-manifest.json)
          jq --arg total "$NEW_TOTAL" '.total = ($total | tonumber)' gemesak-app/list-manifest.json > temp.json && mv temp.json gemesak-app/list-manifest.json
          
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Push Zip Files to data-manifest branch
        if: steps.process.outputs.skip == 'false'
        run: |
          cp new_zips/*.zip gemesak-data/
          cd gemesak-data
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Add new zip files: $(date +'%Y-%m-%d')"
          git push origin data-manifest

      - name: Push Updated list-manifest.json to gemesak-app branch
        if: steps.process.outputs.skip == 'false'
        run: |
          cd gemesak-app
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add list-manifest.json
          git commit -m "Update list-manifest.json: $(date +'%Y-%m-%d')"
          git push origin gemesak-app
