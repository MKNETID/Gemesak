name: Sync External Lua to Gemesak

on:
  workflow_dispatch: # Tetap ada agar bisa dijalankan manual kapan saja
  schedule:
    # Berjalan otomatis setiap hari pada jam 05:00 UTC (12:00 WIB)
    - cron: '0 5 * * *'

jobs:
  sync-external:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Gemesak (App Branch)
        uses: actions/checkout@v4
        with:
          repository: MKNETID/Gemesak
          token: ${{ secrets.API_TOKEN }}
          path: gemesak-app
          ref: gemesak-app

      - name: Checkout Gemesak (Data Branch)
        uses: actions/checkout@v4
        with:
          repository: MKNETID/Gemesak
          token: ${{ secrets.API_TOKEN }}
          path: gemesak-data
          ref: data-manifest

      - name: Process External Repositories
        id: process
        env:
          MY_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          mkdir -p new_zips
          
          # List repositori sumber
          SOURCES=("dvahana2424-web/sojogamesdatabase1" "Princeboy520/ManifestHub" "SPIN0ZAi/SB_manifest_DB")
          
          # Ambil daftar yang sudah ada di JSON
          jq -r '.files[]' gemesak-app/list-manifest.json > existing_list.txt

          FOUND_NEW=false

          for REPO in "${SOURCES[@]}"; do
            echo "------------------------------------------"
            echo "Checking repository: $REPO"
            
            # Ambil daftar branch menggunakan token Anda agar limit besar (5000/jam)
            BRANCHES=$(curl -s -H "Authorization: token $MY_TOKEN" \
              "https://api.github.com/repos/$REPO/branches?per_page=100" | jq -r '.[].name')

            for BRANCH in $BRANCHES; do
              # Validasi: Hanya proses jika nama branch berupa angka (opsional, sesuaikan kebutuhan)
              # Lewati jika branch sudah ada di manifest kita
              if grep -qxF "$BRANCH" existing_list.txt; then
                continue
              fi

              echo "New entry found: $BRANCH"

              # Download file .lua langsung dari root branch
              # Nama file diasumsikan sama dengan nama branch: [BRANCH].lua
              LUA_URL="https://raw.githubusercontent.com/$REPO/$BRANCH/${BRANCH}.lua"
              
              # Gunakan token untuk akses raw jika repo privat (jika publik token tidak wajib tapi aman digunakan)
              HTTP_STATUS=$(curl -o "${BRANCH}.lua" -s -L -w "%{http_code}" \
                -H "Authorization: token $MY_TOKEN" "$LUA_URL")

              if [ "$HTTP_STATUS" -eq "200" ]; then
                echo "Successfully fetched ${BRANCH}.lua. Zipping..."
                
                # Buat zip dengan nama branch, berisi file .lua tadi
                zip -j "new_zips/${BRANCH}.zip" "${BRANCH}.lua"
                rm "${BRANCH}.lua"

                # Masukkan ke daftar JSON
                jq --arg new "$BRANCH" '.files += [$new]' gemesak-app/list-manifest.json > temp.json && mv temp.json gemesak-app/list-manifest.json
                FOUND_NEW=true
              else
                echo "Skipped: ${BRANCH}.lua not found on root (HTTP $HTTP_STATUS)"
                rm -f "${BRANCH}.lua"
              fi
            done
          done
          
          echo "has_new=$FOUND_NEW" >> $GITHUB_OUTPUT

      - name: Finalize JSON and Push Changes
        if: steps.process.outputs.has_new == 'true'
        run: |
          # Urutkan daftar file di JSON agar rapi (A-Z) dan update total
          jq '.files |= sort' gemesak-app/list-manifest.json > temp.json && mv temp.json gemesak-app/list-manifest.json
          NEW_TOTAL=$(jq '.files | length' gemesak-app/list-manifest.json)
          jq --arg total "$NEW_TOTAL" '.total = ($total | tonumber)' gemesak-app/list-manifest.json > temp.json && mv temp.json gemesak-app/list-manifest.json

          # Push ZIP ke branch data-manifest
          cp new_zips/*.zip gemesak-data/
          cd gemesak-data
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Add new zip files from external sources $(date +'%Y-%m-%d')"
          git push origin data-manifest

          # Push JSON ke branch gemesak-app
          cd ../gemesak-app
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add list-manifest.json
          git commit -m "Update manifest list: $NEW_TOTAL files"
          git push origin gemesak-app
