name: Auto Move and Cleanup Manifest

on:
  push:
    branches:
      - update-manifest
  workflow_dispatch: # Memungkinkan menjalankan manual dari tombol di web

jobs:
  sync-process:
    runs-on: ubuntu-latest
    # Memberikan izin tulis agar bot bisa push dan hapus file
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ambil semua branch dan history

      - name: Configure Git Bot
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"

      - name: Move Files to Data-Manifest
        run: |
          # Ambil data terbaru dari server
          git fetch origin update-manifest
          git fetch origin data-manifest
          
          # Pindah ke branch tujuan (tempat 60rb file berada)
          git checkout data-manifest
          
          # Ambil SEMUA file dari branch update-manifest ke branch data-manifest
          # Titik (.) artinya semua file.
          git checkout origin/update-manifest -- .
          
          # Proteksi: Pastikan folder .github tidak ikut tertimpa file dari staging
          git checkout HEAD -- .github/ || true
          
          # Commit jika ada file baru/berubah
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "Bot: Menambahkan manifest baru dari staging"
            git push origin data-manifest
          else
            echo "Tidak ada file baru yang ditemukan."
          fi

      - name: Reset Staging Branch (Cleanup)
        if: success()
        run: |
          # Pindah kembali ke branch staging
          git checkout update-manifest
          
          # Hapus semua file di branch ini agar kosong kembali
          git rm -rf .
          
          # Commit kosong agar branch tidak hilang
          git commit -m "Bot: Cleaning up staging branch"
          
          # Push perubahan kosong ke server
          git push origin update-manifest --force
