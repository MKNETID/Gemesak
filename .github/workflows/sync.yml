steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Mengambil seluruh history dan semua branch

      - name: Config Git
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"

      - name: Copy Files to Data-Manifest
        run: |
          # Pastikan branch update-manifest ada di lokal runner
          git fetch origin update-manifest
          
          # Pindah ke branch tujuan
          git checkout data-manifest
          
          # Ambil file dari branch staging ke branch saat ini
          # Kita gunakan 'origin/update-manifest' untuk referensi yang pasti ada
          git checkout origin/update-manifest -- .
          
          # Hapus file .github jika ikut terbawa agar tidak menimpa workflow utama
          git checkout HEAD -- .github/ || true
          
          # Commit dan Push jika ada perubahan
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-merge manifest baru dari staging"
            git push origin data-manifest
          else
            echo "Tidak ada perubahan untuk di-update."
          fi

      - name: Clean Up Staging Branch
        run: |
          # Pindah ke branch staging
          git checkout update-manifest
          
          # Kosongkan branch
          git rm -rf .
          
          # Buat commit kosong agar branch tetap ada tapi bersih
          git commit -m "Cleanup: Staging branch emptied after sync"
          
          # Push untuk mengosongkan branch di server
          git push origin update-manifest
